apply plugin: "com.diffplug.spotless"

spotless {
  java {
    target "**/*.java"
    trimTrailingWhitespace()
    removeUnusedImports()
    googleJavaFormat()
    endWithNewline()
  }
  kotlin {
    target "**/*.kt"
    ktlint('0.39.0').userData(['indent_size': '4', 'continuation_indent_size': '4'])
    trimTrailingWhitespace()
    endWithNewline()
  }
  kotlinGradle {
    target "*.gradle.kts"
    ktlint('0.39.0').userData(['indent_size': '4', 'continuation_indent_size': '4'])
    trimTrailingWhitespace()
    endWithNewline()
  }
}